<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>  <header>
    <div class="container header-content">
      <h1>Expense Tracker</h1>
      <nav>
        <button id="themeToggle" aria-label="Toggle dark mode">Moon</button>
      </nav>
    </div>
  </header>
  <main class="container">
    <section id="expense-form">
      <h2>Add Expense</h2>
      <form id="expenseForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="e.g. Groceries" required>
        </div>
        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Health">Health</option>
            <option value="Shopping">Shopping</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date">
        </div>
        <button type="submit" class="btn btn-primary">Add Expense</button>
      </form>
    </section>
  </main>
</body>
</html>
