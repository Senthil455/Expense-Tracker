<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>  <header>
    <div class="container header-content">
      <h1>Expense Tracker</h1>
      <nav>
        <button id="themeToggle" aria-label="Toggle dark mode">Moon</button>
      </nav>
    </div>
  </header>
  <main class="container">
    <section id="expense-form">
      <h2>Add Expense</h2>
      <form id="expenseForm">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="e.g. Groceries" required>
        </div>
        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Health">Health</option>
            <option value="Shopping">Shopping</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date">
        </div>
        <button type="submit" class="btn btn-primary">Add Expense</button>
      </form>
    </section>
      <section id="expense-list">
      <h2>Expenses</h2>
      <div class="summary-bar">
        <div>
          <span id="totalExpenses" class="summary-total">Total: $0.00</span>
          <span id="expenseCount" class="summary-count">(0 items)</span>
        </div>
        <div class="summary-controls">
          <select id="filterCategory">
            <option value="all">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Health">Health</option>
            <option value="Shopping">Shopping</option>
            <option value="Other">Other</option>
          </select>
          <input type="text" id="search" placeholder="Search expenses..." />
          <button class="btn btn-sm btn-secondary" id="exportBtn">Export CSV</button>
        </div>
        <div>
          <span id="totalExpenses" class="summary-total">Total: $0.00</span>
          <span id="expenseCount" class="summary-count">(0 items)</span>
        </div>
      </div>
      <div id="expensesContainer"></div>
    </section>
  </main>
  <footer>
    <div class="container">
      <p>Expense Tracker &copy; 2025</p>
    </div>
  </footer>
  <div id="editModal" class="modal" role="dialog" aria-labelledby="editModalTitle">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="editModalTitle">Edit Expense</h3>
        <button class="modal-close" aria-label="Close">X</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editName">Name</label>
          <input type="text" id="editName" required>
        </div>
        <div class="form-group">
          <label for="editAmount">Amount</label>
          <input type="number" id="editAmount" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
          <label for="editCategory">Category</label>
          <select id="editCategory">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Health">Health</option>
            <option value="Shopping">Shopping</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editDate">Date</label>
          <input type="date" id="editDate">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
